<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up your account — Quantiliom AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:   #020202;
      --orange:  #ef6f2e;
      --gray-50: #fafafa;
      --gray-100:#f4f4f4;
      --gray-200:#e5e5e5;
      --gray-300:#d4d4d4;
      --gray-400:#a3a3a3;
      --gray-500:#737373;
      --gray-600:#525252;
      --sans:  'Inter', ui-sans-serif, system-ui, sans-serif;
      --mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --r-sm:  5px;
      --r-card: 8px;
      --r-lg:  12px;
      --spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      background: #fff;
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── BACKGROUND: ambient dot grid that fades from corners ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(2,2,2,0.045) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
      -webkit-mask-image: radial-gradient(ellipse at 50% 40%, #000 30%, transparent 75%);
              mask-image: radial-gradient(ellipse at 50% 40%, #000 30%, transparent 75%);
    }
    .bg-glow {
      position: fixed;
      width: 720px; height: 720px;
      top: -360px; right: -240px;
      background: radial-gradient(circle, rgba(239,111,46,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative;
      z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      flex-shrink: 0;
      animation: fade-in 0.5s ease both;
    }
    /* The brand PNG is a near-square canvas with the actual wordmark
       occupying ~12% of its height (lots of transparent padding around
       it). To make the visible wordmark properly sized, the brand box
       has fixed dimensions + overflow:hidden, and the image is sized by
       width and vertically centered — cropping the empty space. */
    .topbar-brand {
      position: relative;
      width: 200px; height: 48px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .topbar-logo {
      position: absolute;
      width: 200px; height: auto;
      top: 50%; left: 0;
      transform: translateY(-50%);
      display: block;
    }
    .topbar-wordmark {
      font-family: var(--mono); font-size: 13px;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--black);
    }

    /* Topbar progress: 6 segmented chips */
    .topbar-progress { display: flex; gap: 6px; }
    .seg {
      width: 32px; height: 4px;
      border-radius: 999px;
      background: var(--gray-200);
      transition: background .35s var(--spring), width .35s var(--spring), opacity .35s var(--spring);
    }
    .seg.is-done   { background: var(--orange); opacity: 0.4; }
    .seg.is-active { background: var(--orange); opacity: 1; width: 44px; }

    /* ── WIZARD AREA ── */
    .wiz {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 48px 64px;
    }
    .wiz-inner {
      width: 100%;
      max-width: 880px;
    }

    /* Loader */
    .wiz-loader {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      color: var(--gray-500); font-size: 14px;
      padding: 60px 0;
    }
    .wiz-loader[hidden] { display: none; }
    .wiz-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wiz-card {
      animation: fade-up 0.5s var(--spring) both;
    }
    .wiz-card[hidden] { display: none; }

    /* Slide header: mono caption (step number + label) */
    .wiz-caption {
      display: inline-flex; align-items: center; gap: 14px;
      margin-bottom: 22px;
      font-family: var(--mono); font-size: 12px;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--gray-500);
    }
    .wiz-caption .ix {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--r-sm);
      padding: 5px 10px;
    }
    .wiz-caption .ix .cur { color: var(--orange); }
    .wiz-caption .ix .sep { color: var(--gray-300); margin: 0 4px; }
    .wiz-caption .lbl { color: var(--gray-600); }

    /* Slide body */
    .wiz-slide { position: relative; }

    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(36px); filter: blur(2px); }
      to   { opacity: 1; transform: translateX(0);    filter: blur(0); }
    }
    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-36px); filter: blur(2px); }
      to   { opacity: 1; transform: translateX(0);     filter: blur(0); }
    }
    /* animation-fill-mode: backwards holds the first keyframe during any
       delay, then RELEASES the element to its declared style once the
       animation ends — so :hover / .is-selected transforms can apply
       afterwards (they couldn't with `both`). */
    .wiz-slide.dir-next > * {
      animation: slide-in-right .42s var(--spring) backwards;
    }
    .wiz-slide.dir-back > * {
      animation: slide-in-left .42s var(--spring) backwards;
    }
    /* Stagger children — heading first, then helper, then options.
       The pricing slide has an extra child (the billing toggle), so we
       stagger up to the 4th child as well. */
    .wiz-slide > *:nth-child(1) { animation-delay: 0ms; }
    .wiz-slide > *:nth-child(2) { animation-delay: 50ms; }
    .wiz-slide > *:nth-child(3) { animation-delay: 100ms; }
    .wiz-slide > *:nth-child(4) { animation-delay: 150ms; }

    /* Question typography */
    .q {
      font-size: 52px;
      font-weight: 400;
      line-height: 1.04;
      letter-spacing: -1.8px;
      color: var(--black);
      margin-bottom: 12px;
    }
    .q em { font-style: normal; color: var(--orange); }
    .q-helper {
      font-size: 17px;
      color: var(--gray-500);
      line-height: 1.55;
      margin-bottom: 36px;
      max-width: 560px;
    }

    /* ── SINGLE-FIELD OPTION GRID ── */
    .opts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .opt {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--r-card);
      font-family: var(--sans);
      font-size: 16px; font-weight: 400;
      color: var(--black);
      text-align: left;
      transition: border-color .15s, background .15s, box-shadow .15s, transform .12s;
    }
    .opt:hover {
      background: var(--gray-50);
      border-color: var(--gray-400);
      transform: translateY(-1px);
    }
    .opt:active { transform: scale(0.99); }
    .opt.is-selected {
      background: #fff;
      border-color: var(--black);
      box-shadow: 0 0 0 3px rgba(2,2,2,0.07);
    }
    /* odd last option spans both columns so the grid never has a hole */
    .opts > .opt:last-child:nth-child(odd) { grid-column: 1 / -1; }

    .opt-check {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 1px solid var(--gray-300);
      border-radius: 50%;
      position: relative;
      transition: border-color .15s, background .15s;
    }
    .opt-check::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: transparent;
      border-radius: 50%;
      transition: background .15s, transform .15s;
    }
    .opt.is-selected .opt-check { border-color: var(--black); }
    .opt.is-selected .opt-check::after { background: var(--orange); }

    /* ── PRICING SLIDE: billing-period toggle (matches pricing.html) ── */
    .billing-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 14px;
      margin: 4px 0 22px;
    }
    .billing-toggle {
      display: inline-flex;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 40px;
      padding: 4px;
    }
    .billing-opt {
      font-family: var(--mono); font-size: 12px;
      letter-spacing: .04em;
      padding: 7px 20px;
      border-radius: 30px;
      color: var(--gray-500);
      transition: background .2s var(--spring), color .2s;
      user-select: none;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    .billing-opt:hover:not(.active) { color: var(--black); }
    .billing-opt.active {
      background: var(--black);
      color: #fff;
    }
    .save-badge {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .08em; text-transform: uppercase;
      background: rgba(239,111,46,0.12);
      color: var(--orange);
      border-radius: 20px;
      padding: 5px 11px;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .3s var(--spring), transform .3s var(--spring);
      pointer-events: none;
    }
    .save-badge.visible { opacity: 1; transform: translateX(0); }

    /* ── PRICING SLIDE (3 plan cards, matched to pricing.html voice) ── */
    .plans {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: stretch;
    }
    .plan {
      position: relative;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--r-card);
      padding: 28px 26px 26px;
      text-align: left;
      display: flex; flex-direction: column; gap: 14px;
      font-family: var(--sans);
      color: var(--black);
      cursor: pointer;
      transition: border-color .18s, transform .25s var(--spring),
                  box-shadow .25s var(--spring), background .18s;
    }
    .plan:hover {
      transform: translateY(-4px);
      border-color: var(--gray-400);
      box-shadow: 0 14px 36px rgba(2,2,2,0.07);
    }
    .plan.is-selected {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(239,111,46,0.18),
                  0 14px 36px rgba(2,2,2,0.08);
      transform: translateY(-4px);
    }

    /* Pro card — dark, brand-signature variant from pricing.html */
    .plan.pro {
      background: var(--black);
      border-color: var(--black);
      color: #fff;
    }
    .plan.pro:hover {
      border-color: var(--black);
      box-shadow: 0 16px 40px rgba(2,2,2,0.35);
    }
    .plan.pro.is-selected {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(239,111,46,0.42),
                  0 16px 40px rgba(2,2,2,0.35);
    }

    /* Tier label (mono uppercase) */
    .plan-tier {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--gray-500);
    }
    .plan.pro .plan-tier { color: var(--orange); }

    /* Plan name */
    .plan-name {
      font-size: 30px; font-weight: 400;
      letter-spacing: -.8px; line-height: 1.05;
      color: var(--black);
      margin-top: -2px;
    }
    .plan.pro .plan-name { color: #fff; }

    /* Price */
    .plan-price-row {
      display: flex; align-items: baseline; gap: 7px;
      margin: 2px 0 4px;
    }
    .plan-price-val {
      font-size: 42px; font-weight: 400;
      letter-spacing: -1.4px; line-height: 1;
      color: var(--black);
      transition: color .2s;
    }
    .plan.pro .plan-price-val { color: #fff; }
    .plan-price-per {
      font-family: var(--mono); font-size: 12px;
      letter-spacing: .04em;
      color: var(--gray-500);
    }
    .plan.pro .plan-price-per { color: rgba(255,255,255,0.5); }

    /* Strikethrough monthly price shown next to discounted annual price */
    .plan-price-orig {
      font-family: var(--mono); font-size: 13px;
      text-decoration: line-through;
      color: var(--gray-400);
      align-self: flex-end;
      padding-bottom: 6px;
      opacity: 0;
      max-width: 0;
      overflow: hidden;
      transition: opacity .3s var(--spring), max-width .3s var(--spring);
    }
    .plan-price-orig.show { opacity: 1; max-width: 60px; }
    .plan.pro .plan-price-orig { color: rgba(255,255,255,0.3); }

    /* "Billed $XXX / year — save $YY" line shown only in annual mode */
    .plan-annual-note {
      font-family: var(--mono); font-size: 11px;
      color: var(--orange);
      letter-spacing: .04em;
      text-align: center;
      margin-top: 4px;
      min-height: 17px;
      transition: opacity .2s;
    }
    .plan.pro .plan-annual-note { color: rgba(239,111,46,0.9); }

    /* Tagline */
    .plan-tagline {
      font-size: 13.5px; line-height: 1.55;
      color: var(--gray-500);
      max-width: 30ch;
    }
    .plan.pro .plan-tagline { color: rgba(255,255,255,0.6); }

    /* Separator + features */
    .plan-sep {
      height: 1px;
      background: var(--gray-100);
      margin: 6px 0 4px;
    }
    .plan.pro .plan-sep { background: rgba(255,255,255,0.12); }

    .plan-feats {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 9px;
    }
    .plan-feat {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13.5px; line-height: 1.45;
      color: var(--gray-600);
    }
    .plan.pro .plan-feat { color: rgba(255,255,255,0.74); }

    .feat-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 10px;
      font-family: var(--sans); font-weight: 500;
      margin-top: 1px;
      line-height: 1;
    }
    .feat-icon.y { background: rgba(239,111,46,0.12); color: var(--orange); }
    .feat-icon.n { background: var(--gray-100); color: var(--gray-400); }
    .plan.pro .feat-icon.y { background: rgba(239,111,46,0.18); color: var(--orange); }
    .plan.pro .feat-icon.n { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.32); }

    /* Plan grid spans tighter on medium screens */
    @media (max-width: 1080px) {
      .plans { gap: 12px; }
      .plan { padding: 24px 22px 22px; }
      .plan-name { font-size: 26px; }
      .plan-price-val { font-size: 36px; letter-spacing: -1.2px; }
    }

    /* ── FOOTER ── */
    .wiz-foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      margin-top: 40px;
    }
    .wiz-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--sans); font-size: 15px; font-weight: 500;
      border-radius: var(--r-sm); padding: 11px 22px;
      border: 1px solid transparent; line-height: 1.4;
      transition: background .15s, border-color .15s, color .15s,
                  transform .12s, box-shadow .15s, opacity .15s;
    }
    .wiz-btn:disabled { cursor: not-allowed; opacity: 0.42; }
    .wiz-btn-ghost { color: var(--gray-500); padding-left: 8px; padding-right: 8px; }
    .wiz-btn-ghost:hover:not(:disabled) { color: var(--black); }
    .wiz-btn-ghost svg { transition: transform .15s; }
    .wiz-btn-ghost:hover:not(:disabled) svg { transform: translateX(-3px); }
    .wiz-btn-dark {
      background: var(--black); color: #fff; border-color: var(--black);
    }
    .wiz-btn-dark:hover:not(:disabled) {
      background: var(--orange); border-color: var(--orange);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(239,111,46,0.28);
    }
    .wiz-btn-dark:active:not(:disabled) { transform: scale(0.98); box-shadow: none; }
    .wiz-btn-dark svg { transition: transform .2s; flex-shrink: 0; }
    .wiz-btn-dark:hover:not(:disabled) svg { transform: translateX(3px); }

    /* ── TOASTS ── */
    .wiz-toast {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: var(--r-card);
      font-size: 13px; line-height: 1.4;
      margin-top: 18px;
    }
    .wiz-toast[hidden] { display: none; }
    .wiz-toast svg { flex-shrink: 0; width: 15px; height: 15px;
                     stroke: currentColor; fill: none; stroke-width: 2;
                     stroke-linecap: round; stroke-linejoin: round; }
    .wiz-toast-error   { background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; }
    .wiz-toast-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }

    /* ── ANIMATIONS ── */
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 880px) {
      .topbar { padding: 18px 28px; }
      .topbar-brand { width: 170px; height: 40px; }
      .topbar-logo  { width: 170px; }
      .wiz { padding: 16px 28px 48px; }
      .q { font-size: 40px; letter-spacing: -1.1px; }
      .q-helper { font-size: 16px; margin-bottom: 28px; }
      .plans { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .topbar { padding: 16px 20px; }
      .topbar-brand { width: 130px; height: 34px; }
      .topbar-logo  { width: 130px; }
      .seg { width: 22px; }
      .seg.is-active { width: 32px; }
      .wiz { padding: 12px 20px 40px; }
      .q { font-size: 32px; letter-spacing: -.8px; line-height: 1.08; }
      .opts { grid-template-columns: 1fr; }
      .opts > .opt:last-child:nth-child(odd) { grid-column: auto; }
      .wiz-foot { margin-top: 30px; }
      .wiz-btn { padding: 10px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-brand">
      <img class="topbar-logo" src="QuantiliomMainLogo.png" alt="Quantiliom">
    </div>
    <div class="topbar-progress" id="topbarProgress">
      <span class="seg" data-step="0"></span>
      <span class="seg" data-step="1"></span>
      <span class="seg" data-step="2"></span>
      <span class="seg" data-step="3"></span>
      <span class="seg" data-step="4"></span>
      <span class="seg" data-step="5"></span>
    </div>
  </header>

  <main class="wiz">
    <div class="wiz-inner">

      <div class="wiz-loader" id="loader">
        <span class="wiz-spinner"></span>
        <span class="wiz-loader-text">Loading your workspace…</span>
      </div>

      <section class="wiz-card" id="wizardCard" hidden>

        <div class="wiz-caption">
          <span class="ix">
            <span class="cur" id="stepCurrent">01</span><span class="sep">/</span><span id="stepTotal">06</span>
          </span>
          <span class="lbl" id="stepLabel">Your role</span>
        </div>

        <div class="wiz-slide" id="slideBody"></div>

        <!-- Backward-compat target for any script that touches it; topbar segments are the real indicator. -->
        <div id="progressFill" hidden></div>

        <div class="wiz-foot">
          <button class="wiz-btn wiz-btn-ghost" id="backBtn" type="button" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back
          </button>
          <button class="wiz-btn wiz-btn-dark" id="nextBtn" type="button" disabled>
            <span id="nextLabel">Next</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>

        <div class="wiz-toast wiz-toast-error" id="toastError" hidden>
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="toastErrorMsg"></span>
        </div>
        <div class="wiz-toast wiz-toast-success" id="toastSuccess" hidden>
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="toastSuccessMsg"></span>
        </div>

      </section>
    </div>
  </main>

  <script type="module" src="src/registration.js"></script>
</body>
</html>
