<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting — Quantiliom AI</title>
  <meta name="robots" content="noindex">
  <!--
    Onboarding moved to the dashboard repo (quantiliom-ai-dashboard, port 5173).
    This file exists only so any saved/external link to /registration.html keeps
    working. The dashboard's AuthGate decides whether to show the login screen
    or the onboarding wizard based on the user's local onboardingStatus.
  -->
  <meta http-equiv="refresh" content="0;url=http://localhost:5173/">
  <style>
    html, body { height: 100%; margin: 0; background: #fafafa;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #525252; display: grid; place-items: center; }
    .box { text-align: center; }
    .mark { width: 36px; height: 36px; border-radius: 6px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #ef6f2e 0%, #c95621 100%);
      color: #fff; display: grid; place-items: center;
      font: 500 16px/1 'JetBrains Mono', monospace; }
    .label { font: 11px/1 'JetBrains Mono', monospace; letter-spacing: 0.16em;
      text-transform: uppercase; color: #737373; }
    .hint { margin-top: 8px; font-size: 14px; color: #737373; }
    .hint a { color: #020202; border-bottom: 1px solid #d4d4d4; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">Q</div>
    <div class="label">Redirecting to dashboard</div>
    <p class="hint">If you are not redirected automatically, <a href="http://localhost:5173/">open the dashboard</a>.</p>
  </div>
  <script>window.location.replace("http://localhost:5173/");</script>
</body>
</html>
